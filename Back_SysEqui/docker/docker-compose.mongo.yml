services:
  mongo:
    image: mongo:latest
    restart: always
    container_name: mongo
    ports:
      - "27017:27017"
    networks:
      - mongo_network
    volumes:
      - mongo_data:/data/db

  # mongo-express:
  #   image: mongo-express:latest
  #   restart: always
  #   container_name: mongo-express
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     - ME_CONFIG_MONGODB_SERVER=mongo
  #     - ME_CONFIG_MONGODB_PORT=27017
  #   networks:
  #     - mongo_network
  #   depends_on:
  #     - mongo

networks:
  mongo_network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
